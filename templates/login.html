<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>DrugSafe Login</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#2563eb,#1e40af);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.login-container{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.login-container h2{
margin-bottom:10px;
color:#1e3a8a;
}

.login-container p{
color:#6b7280;
margin-bottom:20px;
}

.input-group{
text-align:left;
margin-bottom:15px;
}

.input-group label{
font-size:14px;
color:#374151;
}

.input-group input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #d1d5db;
margin-top:5px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1e40af;
}

/* Error box */
.error{
background:#fee2e2;
color:#b91c1c;
padding:10px;
border-radius:6px;
margin-bottom:15px;
font-size:14px;
}

/* Register link */
.register-link{
margin-top:15px;
font-size:14px;
}

.register-link a{
color:#2563eb;
font-weight:600;
text-decoration:none;
}

.register-link a:hover{
text-decoration:underline;
}

.footer{
margin-top:15px;
font-size:13px;
color:#6b7280;
}

</style>
</head>

<body>

<div class="login-container">

<h2>DrugSafe</h2>
<p>AI Drug Interaction System</p>

<!-- Error message -->
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST" action="/login">

<div class="input-group">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit">Login</button>

</form>

<!-- ✅ REGISTER BUTTON -->
<div class="register-link">
Don't have an account? 
<a href="/register">Register</a>
</div>

<div class="footer">
Medical AI Safety Platform
</div>

</div>

</body>
</html>
