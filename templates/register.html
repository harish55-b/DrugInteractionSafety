<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DrugSafe Register</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#10b981,#065f46);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.register-container{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.register-container h2{
margin-bottom:10px;
color:#065f46;
}

.register-container p{
color:#6b7280;
margin-bottom:20px;
}

.input-group{
text-align:left;
margin-bottom:15px;
}

/* 🔥 IMPORTANT FIX */
.input-wrapper{
position:relative;
width:100%;
}

.input-wrapper input{
width:100%;
padding:10px 60px 10px 10px;
border-radius:8px;
border:1px solid #d1d5db;
margin-top:5px;
box-sizing:border-box; /* FIXES STRETCH ISSUE */
}

/* Show text inside input */
.toggle-text{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:13px;
color:#10b981;
font-weight:600;
}

button{
width:100%;
padding:12px;
background:#10b981;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#065f46;
}

.error{
background:#fee2e2;
color:#b91c1c;
padding:10px;
border-radius:6px;
margin-bottom:15px;
font-size:14px;
}

.login-link{
margin-top:15px;
font-size:14px;
}

.login-link a{
color:#10b981;
font-weight:600;
text-decoration:none;
}

.login-link a:hover{
text-decoration:underline;
}

.footer{
margin-top:15px;
font-size:13px;
color:#6b7280;
}

</style>
</head>

<body>

<div class="register-container">

<h2>Create Account</h2>
<p>Join DrugSafe AI Platform</p>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST" action="/register">

<div class="input-group">
<label>Username</label>
<input type="text" name="username" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #d1d5db;">
</div>

<div class="input-group">
<label>Password</label>

<div class="input-wrapper">
<input type="password" id="password" name="password" required>
<span class="toggle-text" onclick="togglePassword()">Show</span>
</div>

</div>

<button type="submit">Register</button>

</form>

<div class="login-link">
Already have an account? 
<a href="/login">Login</a>
</div>

<div class="footer">
Secure AI Healthcare System
</div>

</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    const toggle = document.querySelector(".toggle-text");

    if (pass.type === "password") {
        pass.type = "text";
        toggle.innerText = "Hide";
    } else {
        pass.type = "password";
        toggle.innerText = "Show";
    }
}
</script>

</body>
</html>
